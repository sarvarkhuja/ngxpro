<div
  class="flex flex-wrap items-center gap-1 min-h-9 w-full p-1.5 cursor-text"
  role="presentation"
  (click)="onTriggerClick($event)"
>
  <!-- Selected chips -->
  @for (item of value(); track identityTrack($index, item)) {
    <span
      class="inline-flex items-center gap-1 rounded-s bg-bg-neutral-1 px-2 py-0.5 text-xs font-medium text-text-secondary leading-none shrink-0"
    >
      <span class="truncate max-w-[12rem]">{{ stringify(item) }}</span>
      @if (!disabled()) {
        <button
          type="button"
          class="ml-0.5 shrink-0 rounded-xs opacity-60 hover:opacity-100 transition-opacity focus:outline-none focus:ring-1 focus:ring-border-focus"
          (click)="removeAt($index); $event.stopPropagation()"
          [attr.aria-label]="'Remove ' + stringify(item)"
        >
          <svg
            viewBox="0 0 20 20"
            fill="currentColor"
            class="h-3 w-3"
            aria-hidden="true"
          >
            <path
              d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"
            />
          </svg>
        </button>
      }
    </span>
  }

  <!-- Focusable input for keyboard/a11y -->
  <input
    #triggerInput
    class="min-w-0 flex-1 bg-transparent outline-none text-sm text-text-primary placeholder:text-text-tertiary disabled:cursor-not-allowed caret-transparent cursor-default select-none"
    [placeholder]="value().length === 0 ? placeholder() : ''"
    [disabled]="disabled()"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-haspopup]="'listbox'"
    [attr.aria-label]="placeholder()"
    [attr.aria-controls]="listboxId"
    role="combobox"
    readonly
    (focus)="focused.set(true)"
    (blur)="onBlur()"
    (keydown.escape)="closeDropdown()"
    (keydown.backspace)="onBackspace()"
    (keydown.space)="openDropdown(); $event.preventDefault()"
    (keydown.enter)="onTriggerClick($event)"
    (keydown.arrowDown)="openDropdown(); $event.preventDefault()"
  />

  <!-- Chevron icon -->
  <svg
    class="h-4 w-4 shrink-0 text-text-tertiary transition-transform duration-normal ml-1"
    [class.rotate-180]="isOpen()"
    viewBox="0 0 20 20"
    fill="currentColor"
    aria-hidden="true"
  >
    <path
      fill-rule="evenodd"
      d="M5.22 8.22a.75.75 0 011.06 0L10 11.94l3.72-3.72a.75.75 0 111.06 1.06l-4.25 4.25a.75.75 0 01-1.06 0L5.22 9.28a.75.75 0 010-1.06z"
      clip-rule="evenodd"
    />
  </svg>
</div>

<!-- Dropdown panel -->
@if (isOpen()) {
  <div
    [id]="listboxId"
    class="absolute left-0 right-0 top-full z-50 mt-1 max-h-60 overflow-y-auto rounded-m border border-border-normal bg-bg-base shadow-lg"
    role="listbox"
    aria-multiselectable="true"
  >
    <nxp-data-list [emptyLabel]="emptyLabel()">
      @for (item of items(); track $index) {
        <nxp-multi-select-option [value]="item" />
      }
    </nxp-data-list>
  </div>
}
