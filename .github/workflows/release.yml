name: Release

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run (no publish, no tag, no GitHub release)'
        required: false
        type: boolean
        default: false
      firstRelease:
        description: 'First release (no previous git tag exists yet)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - run: npm ci --legacy-peer-deps

      - run: npx nx run-many -t lint --parallel=3 -p cdk,core,components,blocks,fintech

      - run: npx nx run-many -t test --parallel=3 -p cdk,core,components,blocks,fintech

      - name: Nx Release
        env:
          NPM_CONFIG_PROVENANCE: 'true'
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx nx release \
            ${{ inputs.firstRelease && '--first-release' || '' }} \
            ${{ inputs.dryRun && '--dry-run' || '' }} \
            --verbose
