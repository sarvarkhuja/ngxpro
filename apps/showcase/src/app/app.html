<nxp-root>
  <div class="min-h-screen flex bg-gray-50 dark:bg-gray-900">
    <aside
      class="w-64 shrink-0 border-r border-gray-200 dark:border-gray-800 flex flex-col bg-white dark:bg-gray-950"
    >
      <div
        class="p-4 flex items-center justify-between border-b border-gray-200 dark:border-gray-800"
      >
        <a
          routerLink="/"
          class="text-sm font-semibold text-gray-900 dark:text-white no-underline"
          >nxp showcase</a
        >
        <app-theme-switcher />
      </div>
      <nxp-nav class="flex-1 overflow-y-auto p-2">
        @for (item of navItems; track item.path) {
          <a nxpNavItem [routerLink]="item.path">{{ item.label }}</a>
        }
      </nxp-nav>
    </aside>
    <main class="flex-1 min-w-0 overflow-y-auto">
      <router-outlet />
    </main>
  </div>
</nxp-root>
